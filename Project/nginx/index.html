<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인페이지 - SY Cloud</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #007bff; color: white; padding: 2rem; text-align: center; }
        .nav-buttons { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .btn { padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; color: white; font-weight: bold; transition: 0.3s; }
        .btn-nginx { background: #009639; } 
        .btn-fastapi { background: #05998b; } 
        .btn-guestbook { background: #e67e22; } /* 방명록 전용 색상 */
        .btn:hover { opacity: 0.8; transform: translateY(-3px); }
        .info { text-align: center; margin-top: 30px; color: #666; }
    </style>
</head>
<body>

<header>
    <h1>SY 통합 서비스 플랫폼</h1>
    <p>AWS EKS & Nginx 기반 인프라 구성</p>
</header>

<div class="nav-buttons">
    <a href="/company" class="btn btn-nginx">회사소개 (Nginx)</a>
    <a href="/board" class="btn btn-fastapi">게시판 (FastAPI)</a>
    <a href="/guestbook" class="btn btn-guestbook">방명록 (FastAPI)</a>
</div>

<div class="info">
    <p>이 서비스는 <strong>EKS 클러스터</strong> 내에서 동작하며,<br>
    ALB Ingress를 통해 경로 기반으로 라우팅됩니다.</p>
    <p>접속 도메인: <code>aaa.sy99.cloud</code></p>
</div>

</body>
</html>
