server {
    listen 80;
    server_name localhost;

    # 메인 페이지
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # 회사 소개 페이지
    # aaa.sy99.cloud/company 로 접속했을 때 처리
    location /company {
        alias /usr/share/nginx/html/;
        try_files /company.html =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}